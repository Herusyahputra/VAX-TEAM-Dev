<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Aware - LTX-2 Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C15;
            color: #FFFFFF;
        }
        .gradient-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(75, 0, 255, 0.15) 0%, transparent 50%);
            z-index: -2;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 0; background: rgba(10, 12, 21, 0.8); backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0A0FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-home { color: #9B9BFF; text-decoration: none; }
        .workspace {
            background: rgba(20, 25, 40, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 48px;
            padding: 40px; margin: 40px 0;
        }
        .input-label {
            color: #9B9BFF; font-size: 14px; font-weight: 600;
            margin-bottom: 16px; text-transform: uppercase;
        }
        .depth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }
        .depth-panel {
            background: #151A28;
            border-radius: 20px;
            padding: 20px;
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .depth-panel img {
            max-width: 100%;
            border-radius: 12px;
        }
        .depth-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a1f2e, #0f1420);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 48px;
        }
        .control-slider {
            margin: 30px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        input[type=range] {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4A4AFF, #9B4DFF);
            border: none; color: white; padding: 16px 40px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            width: 100%; margin-top: 20px;
        }
        .footer { padding: 40px 0; text-align: center; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="container">
        <nav class="navbar">
            <div class="logo">LTX-2STUDIO</div>
            <div>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </nav>

        <div class="workspace">
            <h1 style="font-size: 36px; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #a0a0ff); -webkit-background-clip: text;">Depth Aware Generation</h1>
            
            <div class="input-label"><i class="fas fa-layer-group"></i> DEPTH MAP</div>
            
            <div class="depth-grid">
                <div class="depth-panel">
                    <div class="depth-placeholder">
                        <i class="fas fa-image"></i>
                    </div>
                    <p style="margin-top: 16px; color: rgba(255,255,255,0.5);">Original Image</p>
                </div>
                <div class="depth-panel">
                    <div class="depth-placeholder" style="background: linear-gradient(145deg, #2a2f3e, #1a1f2a);">
                        <i class="fas fa-mountain"></i>
                    </div>
                    <p style="margin-top: 16px; color: rgba(255,255,255,0.5);">Depth Map</p>
                </div>
            </div>

            <div class="control-slider">
                <div class="slider-label"><span>Depth Strength</span><span id="depthValue">70%</span></div>
                <input type="range" min="0" max="100" value="70" oninput="document.getElementById('depthValue').innerText = this.value + '%'">
            </div>

            <div class="control-slider">
                <div class="slider-label"><span>Foreground Focus</span><span id="focusValue">50%</span></div>
                <input type="range" min="0" max="100" value="50" oninput="document.getElementById('focusValue').innerText = this.value + '%'">
            </div>

            <button class="btn-primary" onclick="generateDepth()">Generate with Depth</button>
        </div>

        <footer class="footer">
            <p>© 2026 LTX-2 Studio - Depth Aware Feature</p>
        </footer>
    </div>

    <script>
        function generateDepth() {
            alert('Depth map applied! Generating video with depth awareness... (Demo)');
        }
    </script>
</body>
</html>
