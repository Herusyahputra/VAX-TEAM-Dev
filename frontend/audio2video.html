<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio to Video - LTX-2 Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Same base styles as text2video.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C15;
            color: #FFFFFF;
        }
        .gradient-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(75, 0, 255, 0.15) 0%, transparent 50%);
            z-index: -2;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 0; background: rgba(10, 12, 21, 0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0A0FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-home { color: #9B9BFF; text-decoration: none; }
        .workspace {
            background: rgba(20, 25, 40, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 48px;
            padding: 40px; margin: 40px 0;
        }
        .input-label {
            color: #9B9BFF; font-size: 14px; font-weight: 600;
            margin-bottom: 16px; text-transform: uppercase;
        }
        .audio-upload {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 24px; padding: 60px; text-align: center;
            cursor: pointer; transition: all 0.3s; margin-bottom: 30px;
        }
        .audio-upload:hover {
            border-color: #4A4AFF; background: rgba(74,74,255,0.05);
        }
        .audio-upload i { font-size: 48px; color: #9B9BFF; margin-bottom: 16px; }
        .btn-primary {
            background: linear-gradient(135deg, #4A4AFF, #9B4DFF);
            border: none; color: white; padding: 16px 40px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .control-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px; margin: 30px 0; padding: 30px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .control-item {
            display: flex; flex-direction: column; gap: 8px;
        }
        .control-item label {
            color: #A0A0FF; font-size: 12px; text-transform: uppercase;
        }
        .control-item select {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px; border-radius: 12px;
        }
        .video-container {
            aspect-ratio: 16/9; background: #0C0F1A; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            margin: 30px 0 20px;
        }
        .video-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: rgba(255,255,255,0.3);
        }
        .footer { padding: 40px 0; text-align: center; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="container">
        <nav class="navbar">
            <div class="logo">LTX-2STUDIO</div>
            <div>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </nav>

        <div class="workspace">
            <h1 style="font-size: 36px; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #a0a0ff); -webkit-background-clip: text;">Audio to Video</h1>
            
            <div class="input-label"><i class="fas fa-headphones"></i> UPLOAD AUDIO</div>
            <div class="audio-upload" id="audioUpload">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Upload Audio File</h3>
                <p>MP3, WAV, AAC - Voice, music, or sound effects</p>
                <p style="color: #9B9BFF; margin-top: 16px;">Max: 50MB</p>
            </div>

            <div class="control-grid">
                <div class="control-item">
                    <label>Audio Sync Mode</label>
                    <select>
                        <option>Voice Driven</option>
                        <option>Music Beat Sync</option>
                        <option>Sound Effects</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>Character Type</label>
                    <select>
                        <option>Avatar</option>
                        <option>Podcast Scene</option>
                        <option>Music Video</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>Duration</label>
                    <select>
                        <option>Match Audio</option>
                        <option>4 seconds</option>
                        <option>8 seconds</option>
                    </select>
                </div>
            </div>

            <div class="video-container" id="videoContainer">
                <div class="video-placeholder">
                    <i class="fas fa-music" style="font-size: 64px;"></i>
                    <p>Upload audio to generate video</p>
                </div>
            </div>

            <button class="btn-primary" style="width: 100%;" onclick="processAudio()">Generate from Audio</button>
        </div>

        <footer class="footer">
            <p>© 2026 LTX-2 Studio - Audio to Video Feature</p>
        </footer>
    </div>

    <script>
        document.getElementById('audioUpload').addEventListener('click', function() {
            this.innerHTML = `
                <i class="fas fa-check-circle" style="font-size: 48px; color: #4AFF4A;"></i>
                <h3>Audio uploaded!</h3>
                <p>podcast_episode.mp3 • 8.2 MB</p>
            `;
        });

        function processAudio() {
            const container = document.getElementById('videoContainer');
            container.innerHTML = `
                <div class="video-placeholder">
                    <i class="fas fa-circle-notch fa-spin" style="font-size: 48px; color: #4A4AFF;"></i>
                    <p>Synchronizing audio with video...</p>
                </div>
            `;
            setTimeout(() => {
                container.innerHTML = `
                    <video style="width:100%; height:100%; object-fit:cover;" autoplay loop muted>
                        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" type="video/mp4">
                    </video>
                `;
            }, 4000);
        }
    </script>
</body>
</html>
