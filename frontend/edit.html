<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retake & Extend - LTX-2 Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C15;
            color: #FFFFFF;
        }
        .gradient-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(75, 0, 255, 0.15) 0%, transparent 50%);
            z-index: -2;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 0; background: rgba(10, 12, 21, 0.8); backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0A0FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-home { color: #9B9BFF; text-decoration: none; }
        .workspace {
            background: rgba(20, 25, 40, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 48px;
            padding: 40px; margin: 40px 0;
        }
        .input-label {
            color: #9B9BFF; font-size: 14px; font-weight: 600;
            margin-bottom: 16px; text-transform: uppercase;
        }
        .edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }
        .video-preview {
            background: #151A28;
            border-radius: 20px;
            padding: 20px;
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-preview video {
            width: 100%;
            border-radius: 12px;
        }
        .timeline {
            display: flex;
            gap: 4px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        .timeline-frame {
            flex: 1;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            position: relative;
        }
        .timeline-frame.active {
            background: #4A4AFF;
        }
        .timeline-marker {
            position: absolute;
            top: -5px;
            width: 2px;
            height: 50px;
            background: #FF4AFF;
        }
        .edit-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 30px;
        }
        .edit-panel textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            margin: 20px 0;
            resize: vertical;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4A4AFF, #9B4DFF);
            border: none; color: white; padding: 14px 28px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            width: 100%; margin-top: 10px;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 14px 28px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            margin-right: 12px;
        }
        .extend-control {
            display: flex;
            gap: 16px;
            align-items: center;
            margin: 20px 0;
        }
        .extend-control input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px;
            border-radius: 12px;
        }
        .footer { padding: 40px 0; text-align: center; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="container">
        <nav class="navbar">
            <div class="logo">LTX-2STUDIO</div>
            <div>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </nav>

        <div class="workspace">
            <h1 style="font-size: 36px; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #a0a0ff); -webkit-background-clip: text;">Retake & Extend</h1>
            
            <div class="input-label"><i class="fas fa-cut"></i> VIDEO EDITING</div>
            
            <div class="edit-grid">
                <div>
                    <div class="video-preview">
                        <video style="width:100%;" autoplay loop muted>
                            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                        </video>
                    </div>
                    
                    <div class="timeline">
                        <div class="timeline-frame active"></div>
                        <div class="timeline-frame"></div>
                        <div class="timeline-frame"></div>
                        <div class="timeline-frame"></div>
                        <div class="timeline-frame"></div>
                        <div class="timeline-frame"></div>
                        <div class="timeline-frame"></div>
                        <div class="timeline-frame"></div>
                    </div>
                </div>

                <div class="edit-panel">
                    <h3>Retake Element</h3>
                    <p style="color: rgba(255,255,255,0.5); margin-bottom: 10px;">Select a frame and describe what to change</p>
                    <textarea rows="3" placeholder="Example: change the character's shirt to red, add a hat, make the background darker..."></textarea>
                    <button class="btn-primary" onclick="retakeVideo()">Apply Retake</button>

                    <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0; padding-top: 30px;">
                        <h3>Extend Scene</h3>
                        <div class="extend-control">
                            <input type="number" min="1" max="20" value="4">
                            <span>seconds</span>
                        </div>
                        <button class="btn-primary" style="background: linear-gradient(135deg, #9B4DFF, #FF4AFF);" onclick="extendVideo()">Extend Video</button>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 16px; margin-top: 20px;">
                <button class="btn-secondary"><i class="fas fa-undo"></i> Undo</button>
                <button class="btn-secondary"><i class="fas fa-redo"></i> Redo</button>
                <button class="btn-primary" style="width: auto;" onclick="exportVideo()"><i class="fas fa-download"></i> Export</button>
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 LTX-2 Studio - Retake & Extend Feature</p>
        </footer>
    </div>

    <script>
        function retakeVideo() {
            alert('Retake applied! Regenerating selected elements... (Demo)');
        }
        
        function extendVideo() {
            alert('Extending video by 4 seconds... (Demo)');
        }
        
        function exportVideo() {
            alert('Exporting edited video... (Demo)');
        }
    </script>
</body>
</html>
