<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Control - LTX-2 Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Base styles same as previous files */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C15;
            color: #FFFFFF;
        }
        .gradient-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(75, 0, 255, 0.15) 0%, transparent 50%);
            z-index: -2;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 0; background: rgba(10, 12, 21, 0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0A0FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-home { color: #9B9BFF; text-decoration: none; }
        .workspace {
            background: rgba(20, 25, 40, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 48px;
            padding: 40px; margin: 40px 0;
        }
        .input-label {
            color: #9B9BFF; font-size: 14px; font-weight: 600;
            margin-bottom: 16px; text-transform: uppercase;
        }
        .camera-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .camera-preset {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .camera-preset:hover, .camera-preset.selected {
            border-color: #4A4AFF;
            background: rgba(74,74,255,0.1);
            transform: translateY(-4px);
        }
        .camera-preset i {
            font-size: 32px;
            color: #9B9BFF;
            margin-bottom: 12px;
        }
        .control-slider {
            margin: 30px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        input[type=range] {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4A4AFF, #9B4DFF);
            border: none; color: white; padding: 16px 40px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            width: 100%; margin-top: 30px;
        }
        .video-container {
            aspect-ratio: 16/9; background: #0C0F1A; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        .footer { padding: 40px 0; text-align: center; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="container">
        <nav class="navbar">
            <div class="logo">LTX-2STUDIO</div>
            <div>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </nav>

        <div class="workspace">
            <h1 style="font-size: 36px; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #a0a0ff); -webkit-background-clip: text;">Camera Control</h1>
            
            <div class="input-label"><i class="fas fa-camera"></i> CAMERA MOTION PRESETS</div>
            <div class="camera-grid">
                <div class="camera-preset selected" onclick="selectCamera(this)"><i class="fas fa-video"></i><h4>Static</h4><p>Fixed position</p></div>
                <div class="camera-preset" onclick="selectCamera(this)"><i class="fas fa-arrows-alt-h"></i><h4>Pan</h4><p>Horizontal</p></div>
                <div class="camera-preset" onclick="selectCamera(this)"><i class="fas fa-arrows-alt-v"></i><h4>Tilt</h4><p>Vertical</p></div>
                <div class="camera-preset" onclick="selectCamera(this)"><i class="fas fa-sync-alt"></i><h4>Orbit</h4><p>360° rotation</p></div>
                <div class="camera-preset" onclick="selectCamera(this)"><i class="fas fa-search-plus"></i><h4>Dolly Zoom</h4><p>Hitchcock</p></div>
                <div class="camera-preset" onclick="selectCamera(this)"><i class="fas fa-random"></i><h4>Dynamic</h4><p>AI-guided</p></div>
            </div>

            <div class="control-slider">
                <div class="slider-label"><span>Camera Speed</span><span id="speedValue">5</span></div>
                <input type="range" min="1" max="10" value="5" oninput="document.getElementById('speedValue').innerText = this.value">
            </div>

            <div class="control-slider">
                <div class="slider-label"><span>Motion Smoothness</span><span id="smoothValue">7</span></div>
                <input type="range" min="1" max="10" value="7" oninput="document.getElementById('smoothValue').innerText = this.value">
            </div>

            <div class="video-container" id="videoContainer">
                <div class="video-placeholder" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.3);">
                    <i class="fas fa-camera" style="font-size: 64px;"></i>
                </div>
            </div>

            <button class="btn-primary" onclick="applyCamera()">Apply Camera Motion</button>
        </div>

        <footer class="footer">
            <p>© 2026 LTX-2 Studio - Camera Control Feature</p>
        </footer>
    </div>

    <script>
        function selectCamera(element) {
            document.querySelectorAll('.camera-preset').forEach(p => p.classList.remove('selected'));
            element.classList.add('selected');
        }

        function applyCamera() {
            const container = document.getElementById('videoContainer');
            container.innerHTML = `
                <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#0C0F1A;">
                    <i class="fas fa-circle-notch fa-spin" style="font-size: 48px; color: #4A4AFF;"></i>
                    <p style="margin-left:16px;">Rendering camera movement...</p>
                </div>
            `;
            setTimeout(() => {
                container.innerHTML = `
                    <video style="width:100%; height:100%; object-fit:cover;" autoplay loop muted>
                        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" type="video/mp4">
                    </video>
                `;
            }, 3500);
        }
    </script>
</body>
</html>
